<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Converter | FingerprintConvert</title>

<link rel="icon" href="assets/image/favicon.ico">
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<header class="hero">

<img src="assets/image/image.png" class="logo" alt="Image Converter">

<h1>Image Converter</h1>

<p>Convert images without losing quality.</p>

</header>

<section class="card">

<h2>Upload Image</h2>

<input
type="file"
id="imageFile"
accept=".jpg,.jpeg,.png,.webp,.gif,.bmp,.tiff,.svg">

</section>

<section class="card">

<h2>Convert To</h2>

<select id="imageFormat">

<option value="jpg">JPG</option>
<option value="jpeg">JPEG</option>
<option value="png">PNG</option>
<option value="webp">WEBP</option>
<option value="gif">GIF</option>
<option value="bmp">BMP</option>
<option value="tiff">TIFF</option>
<option value="svg">SVG</option>

</select>

<br><br>

<button id="convertImage">

Convert Image

</button>

</section>

<section class="card">

<h2>Extra Image Tools</h2>

<ul>
<li>Resize Image</li>
<li>Compress Image</li>
<li>Crop Image</li>
<li>Rotate Image</li>
<li>Convert to WebP</li>
</ul>

</section>

<section class="card">

<h2>Supported Formats</h2>

<p>

JPG • JPEG • PNG • WEBP • GIF • BMP • TIFF • SVG

</p>

</section>

<footer>

<p>

© 2026 FingerprintConvert

</p>

</footer>

<script src="assets/js/script.js"></script>

</body>

</html>
