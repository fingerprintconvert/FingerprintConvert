<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Downloader | FingerprintConvert</title>

<link rel="icon" href="assets/image/favicon.ico">
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<header class="hero">

<img src="assets/image/downloader.png" class="logo" alt="Downloader">

<h1>Video Downloader</h1>

<p>Download supported online videos by pasting a URL.</p>

</header>

<section class="card">

<h2>Paste Video URL</h2>

<input
type="url"
id="videoUrl"
placeholder="https://example.com/video">

</section>

<section class="card">

<h2>Select Platform</h2>

<select id="platform">

<option value="tiktok">TikTok</option>

<option value="facebook">Facebook</option>

<option value="instagram">Instagram</option>

<option value="x">X (Twitter)</option>

<option value="pinterest">Pinterest</option>

</select>

<br><br>

<button id="downloadBtn">

Download

</button>

</section>

<section class="card">

<h2>Important</h2>

<p>

Only download content that you own or that you have permission to download. Please respect copyright and each platform's terms of service.

</p>

</section>

<footer>

<p>

© 2026 FingerprintConvert

</p>

</footer>

<script src="assets/js/script.js"></script>

</body>
</html>
