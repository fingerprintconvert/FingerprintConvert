<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Tools | FingerprintConvert</title>

<link rel="icon" href="assets/image/favicon.ico">
<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<header class="hero">

<img src="assets/image/pdf.png" class="logo" alt="PDF Tools">

<h1>PDF Tools</h1>

<p>Convert and manage PDF documents easily.</p>

</header>

<section class="card">

<h2>Upload Document</h2>

<input
type="file"
id="pdfFile"
accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">

</section>

<section class="card">

<h2>Choose Tool</h2>

<select id="pdfTool">

<option value="pdf-word">PDF → Word</option>
<option value="word-pdf">Word → PDF</option>
<option value="pdf-jpg">PDF → JPG</option>
<option value="jpg-pdf">JPG → PDF</option>
<option value="merge">Merge PDF</option>
<option value="split">Split PDF</option>
<option value="compress">Compress PDF</option>
<option value="rotate">Rotate PDF</option>
<option value="protect">Protect PDF</option>
<option value="unlock">Unlock PDF</option>

</select>

<br><br>

<button id="convertPdf">

Process PDF

</button>

</section>

<section class="card">

<h2>Supported Documents</h2>

<p>

PDF • DOC • DOCX • JPG • JPEG • PNG

</p>

</section>

<footer>

<p>

© 2026 FingerprintConvert

</p>

</footer>

<script src="assets/js/script.js"></script>

</body>
</html>
